content:
  - name: projects
    label: Projects
    path: src/data/projects
    type: collection
    filename: '{fields.slug}.md'
    view:
      fields: [heroImage, title, pubDate]
    fields:
      - name: pubDatetime
        label: Publication Date
        type: date
        options:
          time: true
          format: yyyy-MM-dd'T'HH:mm:ss'Z'
      - name: modDatetime
        label: Modified Date
        type: date
        options:
          time: true
          format: yyyy-MM-dd'T'HH:mm:ss'Z'
      - name: title
        label: Title
        type: string
      - name: slug
        label: Slug
        type: string
      - name: status
        label: Status
        type: select
        options:
          values: [ active, hiatus, defunct ]
      - name: description
        label: Description
        type: string
      - name: tag
        label: Tag
        type: select
        options:
          values: [ tech, sports, music ]
      - name: body
        label: Body
        type: rich-text
      - name: heroImage
        label: Hero Image
        type: image
  - name: experience
    label: Experience
    path: src/data/experience
    type: collection
    filename: '{fields.company}.md'
    view:
      fields: [icon, title, pubDate]
    fields:
      - name: startDate
        label: Start Date
        type: date
        options:
          time: true
          format: yyyy-MM
      - name: endtime
        label: End Date
        type: date
        options:
          time: true
          format: yyyy-MM
      - name: icon
        label: Icon
        type: image
      - name: company
        label: Company
        type: string
      - name: location
        label: Location
        type: string
      - name: country
        label: Country
        type: select
        options:
          values: [ AU, PH ]
      - name: role
        label: Role
        type: string
      - name: status
        label: Status
        type: select
        options:
          values: [ current, past ]
      - name: body
        label: Body
        type: rich-text
  - name: HomepageSettings
    label: Homepage Settings
    path: src/data/homepage.json
    type: file
    fields:
      - name: role
        label: Role
        type: string
      - name: location
        label: Location
        type: string
      - name: linkedIn
        label: Linkedin
        type: string
      - name: github
        label: Github
        type: string
      - name: email
        label: Email
        type: string
      - name: aboutMe
        label: About Me
        type: rich-text
      
      
media:
  - name: files
    label: Files
    input: data/attachments
    output: /data/attachments
    categories: [ png, webp ]